<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tony's English Classes</title>

<style>
:root{
    --dark:#0E1D2E;
    --light:#F4F4F4;
    --accent:#FF6400;
}

body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:var(--light);
    color:var(--dark);
}

/* HEADER */

header{
    background:var(--dark);
    color:white;
    text-align:center;
    padding:60px 20px 40px 20px;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

h1{
    margin:0;
    font-size:42px;
    letter-spacing:1px;
}

.subtitle{
    margin-top:10px;
    font-weight:300;
    opacity:0.8;
}

/* MAIN SECTION */

.main{
    text-align:center;
    padding:100px 20px;
}

.lesson-card{
    display:inline-block;
    background:white;
    padding:50px 60px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    transition:0.3s;
}

.lesson-card:hover{
    transform:translateY(-8px);
}

button{
    margin-top:30px;
    padding:18px 40px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e55a00;
    transform:scale(1.05);
}

/* FOOTER */

footer{
    background:var(--dark);
    color:white;
    text-align:center;
    padding:20px;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <h1>Tony's English Classes</h1>
    <div class="subtitle">Conversation • Fluency • Confidence</div>
</header>

<div class="main">
    <div class="lesson-card">
        <h2>💘 LOVE LAB</h2>
        <p>I Say a Little Prayer – Conversation Experience</p>
        <button onclick="goToLoveLab()">Start Lesson</button>
    </div>
</div>

<footer>
    © 2026 Tony's English Classes • Zampar
</footer>

<script>
function goToLoveLab(){
    window.location.href="love-lab.html";
}
</script>

</body>
</html>
