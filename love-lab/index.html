<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOVE LAB – I Say a Little Prayer</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#1e1e2f,#3a0ca3);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    text-align:center;
}

h1{
    margin-top:40px;
    font-size:40px;
}

#card{
    width:60%;
    margin:40px auto;
    padding:30px;
    background:#2a2a40;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    min-height:120px;
    font-size:20px;
}

button{
    padding:15px 30px;
    margin:15px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.pro{
    background:#06d6a0;
    color:black;
}

.con{
    background:#ef476f;
}

.next{
    background:#ffd166;
    color:black;
}

button:hover{
    transform:scale(1.1);
}

#result{
    margin-top:20px;
    font-size:18px;
    opacity:0.9;
}
</style>
</head>

<body>

<h1>💘 LOVE LAB</h1>
<h3>I Say a Little Prayer – Conversation Challenge</h3>

<div id="card">
Click "Start" to begin.
</div>

<button class="next" onclick="nextScenario()">Start</button>

<div id="buttons" style="display:none;">
    <button class="pro" onclick="choose('Pro')">❤️ Pro</button>
    <button class="con" onclick="choose('Con')">💔 Con</button>
</div>

<div id="result"></div>

<script>

const scenarios = [
"You wake up every day thinking about one person first.",
"You feel incomplete without your partner.",
"You pray for your partner's happiness constantly.",
"You cancel plans with friends to stay with your partner.",
"You feel stronger because someone believes in you.",
"You depend emotionally on your partner to feel okay.",
"You imagine your future only with that person.",
"You feel jealous when your partner talks to others.",
"You feel motivated to improve because of love.",
"You lose focus on your own goals."
];

let current = 0;

function nextScenario(){
    if(current >= scenarios.length){
        document.getElementById("card").innerHTML = "End of Love Lab 💘<br>Now discuss: Is love more positive or more dangerous?";
        document.getElementById("buttons").style.display = "none";
        return;
    }

    document.getElementById("card").innerHTML = scenarios[current];
    document.getElementById("buttons").style.display = "block";
    document.getElementById("result").innerHTML = "";
}

function choose(answer){
    const followUps = [
        "Why do you think that?",
        "Can you give a real example?",
        "Would you feel comfortable in that situation?",
        "Do you agree with the idea of love in the song?",
        "Is this healthy or unhealthy love?",
        "What would you do differently?"
    ];

    let randomQuestion = followUps[Math.floor(Math.random()*followUps.length)];

    document.getElementById("result").innerHTML =
    "You chose: <b>" + answer + "</b><br><br>Discussion Question:<br><i>" + randomQuestion + "</i>";

    current++;
}

</script>

</body>
</html>
